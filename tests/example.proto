syntax = "proto3";

package test.ultimate;

import "protocyte/options.proto";

// File-level options
option optimize_for = SPEED;
option (protocyte.package_constant) = { name: "BASE_COUNT" kind: INT32 literal: "5" };
option (protocyte.package_constant) = { name: "PREFIX" kind: STRING expr: "substr(\"protocyte\", 0, 5)" };
option (protocyte.package_constant) = { name: "BYTE_ARRAY_CAP" kind: UINT32 expr: "len(PREFIX) - 1" };

// -----------------------------------------------------------------------------
//                      The Most Annoying Proto3 Message
// -----------------------------------------------------------------------------

message UltimateComplexMessage {
  // -------------------------------------------------------------------------
  // Message constants
  // -------------------------------------------------------------------------
  option (protocyte.constant) = { name: "SHIFTED_COUNT" kind: INT64 expr: "BASE_COUNT * 1000000000" };
  option (protocyte.constant) = { name: "MASK_BITS" kind: UINT64 literal: "1234567890123456789" };
  option (protocyte.constant) = { name: "FLOAT_SCALE" kind: FLOAT literal: "1.25" };
  option (protocyte.constant) = { name: "DOUBLE_SCALE" kind: DOUBLE expr: "FLOAT_SCALE + 2.5" };
  option (protocyte.constant) = { name: "FLAG_LITERAL" kind: BOOL literal: "true" };
  option (protocyte.constant) = { name: "HEX_LITERAL" kind: UINT32 literal: "0x20" };
  option (protocyte.constant) = { name: "HEX_SUM" kind: UINT32 expr: "0x10 + 0x8" };
  option (protocyte.constant) = { name: "INTEGER_ARRAY_CAP" kind: UINT32 expr: "(BASE_COUNT * 2) - 2" };
  option (protocyte.constant) = { name: "LABEL" kind: STRING expr: "PREFIX + \"-demo\"" };
  option (protocyte.constant) = { name: "UNICODE_LABEL" kind: STRING literal: "Āé" };
  option (protocyte.constant) = { name: "FIXED_INTEGER_ARRAY_CAP" kind: UINT32 expr: "BASE_COUNT - 2" };
  option (protocyte.constant) = { name: "FLOATISH_BOUND" kind: UINT32 expr: "4 / 2.0" };
  option (protocyte.constant) = { name: "GT_CHECK" kind: BOOL expr: "BASE_COUNT > 4" };
  option (protocyte.constant) = { name: "LE_CHECK" kind: BOOL expr: "BYTE_ARRAY_CAP <= INTEGER_ARRAY_CAP" };
  option (protocyte.constant) = { name: "EQ_CHECK" kind: BOOL expr: "PREFIX == \"proto\"" };
  option (protocyte.constant) = { name: "NE_CHECK" kind: BOOL expr: "LABEL != \"proto\"" };
  option (protocyte.constant) = {
    name: "HAS_PREFIX"
    kind: BOOL
    expr: "starts_with(LABEL, PREFIX) && !starts_with(LABEL, \"zzz\")"
  };
  option (protocyte.constant) = { name: "MOD_CHECK" kind: INT32 expr: "BASE_COUNT % 2" };
  option (protocyte.constant) = { name: "OR_CHECK" kind: BOOL expr: "HAS_PREFIX || false" };

  // -------------------------------------------------------------------------
  // Reserved slots (ensure your generator correctly handles “holes”)
  // -------------------------------------------------------------------------
  reserved 3, 5 to 7, 20;
  reserved "old_name", "legacy_field";

  // -------------------------------------------------------------------------
  // Basic Scalar Fields (all proto3 types)
  // -------------------------------------------------------------------------
  double      f_double        = 1;
  float       f_float         = 2;
  int32       f_int32         = 4;
  int64       f_int64         = 8;
  uint32      f_uint32        = 9;
  uint64      f_uint64        = 10;
  sint32      f_sint32        = 11;
  sint64      f_sint64        = 12;
  fixed32     f_fixed32       = 13;
  fixed64     f_fixed64       = 14;
  sfixed32    f_sfixed32      = 15;
  sfixed64    f_sfixed64      = 16;
  bool        f_bool          = 17;
  string      f_string        = 18;
  bytes       f_bytes         = 19;

  // -------------------------------------------------------------------------
  // Repeated Scalars (packed and unpacked)
  // -------------------------------------------------------------------------
  repeated int32 r_int32_unpacked = 21 [packed = false];
  repeated int32 r_int32_packed   = 22 [packed = true];

  repeated double r_double        = 23; // implicit packed=true in proto3

  // -------------------------------------------------------------------------
  // Enums (with nested enum)
  // -------------------------------------------------------------------------
  enum Color {
    COLOR_UNSPECIFIED = 0;
    RED = 1;
    GREEN = 2;
    BLUE = 3;
  }

  Color color = 24;

  // -------------------------------------------------------------------------
  // Nested Message Types
  // -------------------------------------------------------------------------
  message NestedLevel1 {
    string name = 1;
    int32  id   = 2;

    message NestedLevel2 {
      string description = 1;
      repeated float values = 2;

      enum InnerEnum {
        INNER_UNSPECIFIED = 0;
        A = 1;
        B = 2;
        C = 3;
      }

      InnerEnum mode = 3;
    }

    NestedLevel2 inner = 3;
  }

  NestedLevel1 nested1 = 25;

  // -------------------------------------------------------------------------
  // Oneof fields (mixed types)
  // -------------------------------------------------------------------------
  oneof special_oneof {
    string oneof_string = 26;
    int32  oneof_int32  = 27;
    NestedLevel1 oneof_msg = 28;
    bytes oneof_bytes   = 29 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP" }];
  }

  message RepeatedBytesHolder {
    repeated bytes values = 1;
  }

  message BoundedRepeatedBytesHolder {
    repeated bytes values = 1 [(protocyte.array) = { max: 3 }];
  }

  message FixedRepeatedBytesHolder {
    repeated bytes values = 1 [(protocyte.array) = { max: 3 }, (protocyte.fixed) = true];
  }

  oneof crazy_bytes_oneof {
    bytes crazy_plain_bytes = 49;
    bytes crazy_bounded_bytes = 50 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP" }];
    bytes crazy_fixed_bytes = 51 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP" }, (protocyte.fixed) = true];
    RepeatedBytesHolder crazy_repeated_bytes = 52;
    BoundedRepeatedBytesHolder crazy_bounded_repeated_bytes = 53;
    FixedRepeatedBytesHolder crazy_fixed_repeated_bytes = 54;
  }

  // -------------------------------------------------------------------------
  // Maps (all legal map key types)
  // -------------------------------------------------------------------------
  map<string, int32> map_str_int32      = 30;
  map<int32, string> map_int32_str      = 31;
  map<bool, bytes>   map_bool_bytes     = 32;
  map<uint64, NestedLevel1> map_uint64_msg = 33;

  // -------------------------------------------------------------------------
  // Deeply Nested Maps & Messages
  // -------------------------------------------------------------------------
  map<string, NestedLevel1.NestedLevel2> very_nested_map = 34;

  // -------------------------------------------------------------------------
  // Messages referencing themselves (cycle)
  // -------------------------------------------------------------------------
  UltimateComplexMessage recursive_self = 35;

  // -------------------------------------------------------------------------
  // Repeated messages + oneofs mixed
  // -------------------------------------------------------------------------
  repeated NestedLevel1.NestedLevel2 lots_of_nested = 36;

  // -------------------------------------------------------------------------
  // Huge repeated enum list
  // -------------------------------------------------------------------------
  repeated Color colors = 37;

  // -------------------------------------------------------------------------
  // Optional fields (proto3 style)
  // -------------------------------------------------------------------------
  optional int32 opt_int32 = 38;
  optional string opt_string = 39;

  // -------------------------------------------------------------------------
  // Extremely deep nesting
  // -------------------------------------------------------------------------
  message LevelA {
    message LevelB {
      message LevelC {
        message LevelD {
          message LevelE {
            string extreme = 1;
            map<int32, string> weird_map = 2;
            oneof deep_oneof {
              int64 val = 3;
              string text = 4;
            }
          }
        }
      }
    }
  }

  LevelA.LevelB.LevelC.LevelD.LevelE extreme_nesting = 40;

  // -------------------------------------------------------------------------
  // Fixed-size binary fields
  // -------------------------------------------------------------------------
  // SHA-256 digest stored inline as exactly 32 bytes, derived from constants.
  bytes sha256 = 41 [(protocyte.array) = { expr: "INTEGER_ARRAY_CAP * 4" }, (protocyte.fixed) = true];
  repeated int32 integer_array = 42 [(protocyte.array) = { expr: "INTEGER_ARRAY_CAP" }];
  bytes byte_array = 43 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP" }];
  repeated uint32 fixed_integer_array = 44 [(protocyte.array) = { expr: "FIXED_INTEGER_ARRAY_CAP" }, (protocyte.fixed) = true];
  bytes float_expr_array = 45 [(protocyte.array) = { expr: "FLOATISH_BOUND" }];
  repeated bytes repeated_byte_array = 46;
  repeated bytes bounded_repeated_byte_array = 47 [(protocyte.array) = { max: 3 }];
  repeated bytes fixed_repeated_byte_array = 48 [(protocyte.array) = { max: 3 }, (protocyte.fixed) = true];
}

// -----------------------------------------------------------------------------
// Additional Messages to Cross-Reference
// -----------------------------------------------------------------------------

message ExtraMessage {
  string tag = 1;
  UltimateComplexMessage ref = 2;
}

message CrossMessageConstants {
  option (protocyte.constant) = {
    name: "ROOT_MIRROR"
    kind: UINT32
    expr: "UltimateComplexMessage.INTEGER_ARRAY_CAP + 2"
  };
  option (protocyte.constant) = {
    name: "LABEL_COPY"
    kind: STRING
    expr: "PREFIX + \"-cross\""
  };
  option (protocyte.constant) = {
    name: "READY"
    kind: BOOL
    expr: "UltimateComplexMessage.HAS_PREFIX && (ROOT_MIRROR == 10)"
  };

  bytes external_bytes = 1 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP + 2" }];
  repeated int32 mirrored_values = 2 [(protocyte.array) = { expr: "ROOT_MIRROR" }];

  message Nested {
    option (protocyte.constant) = {
      name: "EXTERNAL_CAP"
      kind: UINT32
      expr: "BASE_COUNT + 3"
    };

    bytes nested_bytes = 1 [(protocyte.array) = { expr: "EXTERNAL_CAP" }];
  }

  Nested nested = 3;
}
