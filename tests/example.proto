syntax = "proto3";

package test.ultimate;

import "protocyte/options.proto";

// File-level options
option optimize_for = SPEED;
option (protocyte.package_constant) = { name: "BASE_COUNT" i32: 5 };
option (protocyte.package_constant) = { name: "PREFIX" str_expr: "substr(\"protocyte\", 0, 5)" };
option (protocyte.package_constant) = { name: "BYTE_ARRAY_CAP" u32_expr: "len(PREFIX) - 1" };
option (protocyte.package_constant) = { name: "BITWISE_BASE" u32_expr: "(true << 3) | 2" };
option (protocyte.package_constant) = { name: "MATH_BASE" u32_expr: "max(2, sqrt(9))" };

// -----------------------------------------------------------------------------
//                      The Most Annoying Proto3 Message
// -----------------------------------------------------------------------------

message UltimateComplexMessage {
  // -------------------------------------------------------------------------
  // Message constants
  // -------------------------------------------------------------------------
  option (protocyte.constant) = { name: "SHIFTED_COUNT" i64_expr: "i64(BASE_COUNT) * 1000000000" };
  option (protocyte.constant) = { name: "MASK_BITS" u64: 1234567890123456789 };
  option (protocyte.constant) = { name: "FLOAT_SCALE" f32: 1.25 };
  option (protocyte.constant) = { name: "DOUBLE_SCALE" f64_expr: "FLOAT_SCALE + 2.5" };
  option (protocyte.constant) = { name: "FLAG_LITERAL" boolean: true };
  option (protocyte.constant) = { name: "HEX_LITERAL" u32: 32 };
  option (protocyte.constant) = { name: "HEX_SUM" u32_expr: "0x10 + 0x8" };
  option (protocyte.constant) = { name: "HEX_E_DIGITS" u32_expr: "0xDEADBEEF & 0xFFFF" };
  option (protocyte.constant) = { name: "INTEGER_ARRAY_CAP" u32_expr: "(BASE_COUNT * 2) - 2" };
  option (protocyte.constant) = { name: "LABEL" str_expr: "PREFIX + \"-demo\"" };
  option (protocyte.constant) = { name: "UNICODE_LABEL" str: "Āé" };
  option (protocyte.constant) = { name: "FIXED_INTEGER_ARRAY_CAP" u32_expr: "BASE_COUNT - 2" };
  option (protocyte.constant) = { name: "FLOATISH_BOUND" u32_expr: "4 / 2.0" };
  option (protocyte.constant) = { name: "GT_CHECK" boolean_expr: "BASE_COUNT > 4" };
  option (protocyte.constant) = { name: "LE_CHECK" boolean_expr: "BYTE_ARRAY_CAP <= INTEGER_ARRAY_CAP" };
  option (protocyte.constant) = { name: "EQ_CHECK" boolean_expr: "PREFIX == \"proto\"" };
  option (protocyte.constant) = { name: "NE_CHECK" boolean_expr: "LABEL != \"proto\"" };
  option (protocyte.constant) = {
    name: "HAS_PREFIX"
    boolean_expr: "starts_with(LABEL, PREFIX) && !starts_with(LABEL, \"zzz\")"
  };
  option (protocyte.constant) = { name: "MOD_CHECK" i32_expr: "BASE_COUNT % 2" };
  option (protocyte.constant) = { name: "OR_CHECK" boolean_expr: "HAS_PREFIX || false" };
  option (protocyte.constant) = { name: "I32_BITWISE" i32_expr: "~0" };
  option (protocyte.constant) = { name: "U32_BITWISE" u32_expr: "~u32(0)" };
  option (protocyte.constant) = { name: "I64_BITWISE" i64_expr: "i64(1) << 40" };
  option (protocyte.constant) = { name: "U64_BITWISE" u64_expr: "(~u64(0)) ^ 0xf" };
  option (protocyte.constant) = { name: "F32_BITWISE" f32_expr: "(1 << 3) | 1" };
  option (protocyte.constant) = { name: "F64_BITWISE" f64_expr: "true << 4" };
  option (protocyte.constant) = { name: "BOOL_BITWISE" boolean_expr: "BITWISE_BASE & 0x8" };
  option (protocyte.constant) = {
    name: "BOOL_BITWISE_LOGIC"
    boolean_expr: "(BITWISE_BASE & 0x8) && FLAG_LITERAL"
  };
  option (protocyte.constant) = { name: "BOOL_INTEGER" boolean_expr: "1 + 1" };
  option (protocyte.constant) = { name: "BOOL_ARITHMETIC" i32_expr: "true + true" };
  option (protocyte.constant) = { name: "FLOAT_LOGIC" boolean_expr: "0.5 && !0.0" };
  option (protocyte.constant) = { name: "SHORT_CIRCUIT_AND" boolean_expr: "false && (1 / 0)" };
  option (protocyte.constant) = { name: "SHORT_CIRCUIT_OR" boolean_expr: "true || (1 / 0)" };
  option (protocyte.constant) = { name: "MIXED_UNSIGNED" u32_expr: "BASE_COUNT - BITWISE_BASE" };
  option (protocyte.constant) = { name: "MIXED_COMPARE" boolean_expr: "(-1) < BITWISE_BASE" };
  option (protocyte.constant) = { name: "MIXED_EQUAL" boolean_expr: "I32_BITWISE == U32_BITWISE" };
  option (protocyte.constant) = { name: "F32_EQUAL_SOURCE" f32: 16777216.0 };
  option (protocyte.constant) = { name: "MIXED_F32_EQUAL" boolean_expr: "F32_EQUAL_SOURCE == 16777217" };
  option (protocyte.constant) = { name: "BITWISE_SOURCE_NORMALIZED" i64_expr: "(-u32(1)) & i64(4294967296)" };
  option (protocyte.constant) = { name: "SHIFT_COUNT_NORMALIZED" i32_expr: "1 << -U32_BITWISE" };
  option (protocyte.constant) = { name: "CAST_U32" u32_expr: "u32(-1)" };
  option (protocyte.constant) = { name: "CAST_I32" i32_expr: "i32(CAST_U32)" };
  option (protocyte.constant) = { name: "CAST_I64" i64_expr: "i64(CAST_I32)" };
  option (protocyte.constant) = { name: "CAST_U64" u64_expr: "u64(CAST_I32)" };
  option (protocyte.constant) = { name: "CAST_F32" f32_expr: "f32(16777217)" };
  option (protocyte.constant) = { name: "CAST_F64" f64_expr: "f64(CAST_F32) + 0.5" };
  option (protocyte.constant) = { name: "CAST_BOOL" boolean_expr: "bool(0.5)" };
  option (protocyte.constant) = { name: "CAST_STR" str_expr: "str(CAST_I32)" };
  option (protocyte.constant) = {
    name: "STR_BITWISE"
    str_expr: "substr(\"abcd\", 1 << 0, 1 | 0)"
  };
  option (protocyte.constant) = { name: "MATH_POW" i32_expr: "pow(2, 5)" };
  option (protocyte.constant) = { name: "MATH_U64_POW" u64_expr: "pow(2, 63)" };
  option (protocyte.constant) = { name: "MATH_ABS" i64_expr: "abs(-9)" };
  option (protocyte.constant) = { name: "MATH_MIN" u32_expr: "min(MATH_BASE, 5, 4)" };
  option (protocyte.constant) = { name: "MATH_F32" f32_expr: "pow(FLOAT_SCALE, 2)" };
  option (protocyte.constant) = { name: "MATH_EXP" f64_expr: "exp(0)" };
  option (protocyte.constant) = { name: "MATH_LOG" f64_expr: "log(exp(2.0))" };
  option (protocyte.constant) = { name: "MATH_LOG2" f64_expr: "log2(16)" };
  option (protocyte.constant) = { name: "MATH_LOG10" f64_expr: "log10(1000)" };
  option (protocyte.constant) = { name: "MATH_CEIL" f64_expr: "ceil(-2.1)" };
  option (protocyte.constant) = { name: "MATH_FLOOR" f64_expr: "floor(-2.1)" };
  option (protocyte.constant) = { name: "MATH_TRUNC" f64_expr: "trunc(-2.9)" };
  option (protocyte.constant) = { name: "MATH_ROUND" f64_expr: "round(-2.5)" };
  option (protocyte.constant) = { name: "MATH_ROUND_BELOW" f64_expr: "round(0.49999999999999994)" };
  option (protocyte.constant) = { name: "MATH_NEGATIVE_POW" u32_expr: "pow(2, -3) * 8" };
  option (protocyte.constant) = { name: "MATH_INTEGRAL_NEGATIVE_POW" f64_expr: "pow(2, -3)" };
  option (protocyte.constant) = { name: "MATH_ACCURATE_NEGATIVE_POW" f64_expr: "pow(10, f64(-23))" };
  option (protocyte.constant) = { name: "MATH_TRUNC_INT" i32_expr: "-2.9" };
  option (protocyte.constant) = { name: "MATH_BOOL" boolean_expr: "max(false, true)" };
  option (protocyte.constant) = {
    name: "MATH_STR"
    str_expr: "substr(\"abcd\", floor(1.9), max(1, 1))"
  };

  // -------------------------------------------------------------------------
  // Reserved slots (ensure your generator correctly handles "holes")
  // -------------------------------------------------------------------------
  reserved 3, 5 to 7, 20;
  reserved "old_name", "legacy_field";

  // -------------------------------------------------------------------------
  // Basic Scalar Fields (all proto3 types)
  // -------------------------------------------------------------------------
  double      f_double        = 1;
  float       f_float         = 2;
  int32       f_int32         = 4;
  int64       f_int64         = 8;
  uint32      f_uint32        = 9;
  uint64      f_uint64        = 10;
  sint32      f_sint32        = 11;
  sint64      f_sint64        = 12;
  fixed32     f_fixed32       = 13;
  fixed64     f_fixed64       = 14;
  sfixed32    f_sfixed32      = 15;
  sfixed64    f_sfixed64      = 16;
  bool        f_bool          = 17;
  string      f_string        = 18;
  bytes       f_bytes         = 19;

  // -------------------------------------------------------------------------
  // Repeated Scalars (packed and unpacked)
  // -------------------------------------------------------------------------
  repeated int32 r_int32_unpacked = 21 [packed = false];
  repeated int32 r_int32_packed   = 22 [packed = true];

  repeated double r_double        = 23; // implicit packed=true in proto3

  // -------------------------------------------------------------------------
  // Enums (with nested enum)
  // -------------------------------------------------------------------------
  enum Color {
    COLOR_UNSPECIFIED = 0;
    RED = 1;
    GREEN = 2;
    BLUE = 3;
  }

  Color color = 24;

  // -------------------------------------------------------------------------
  // Nested Message Types
  // -------------------------------------------------------------------------
  message NestedLevel1 {
    string name = 1;
    int32  id   = 2;

    message NestedLevel2 {
      string description = 1;
      repeated float values = 2;

      enum InnerEnum {
        INNER_UNSPECIFIED = 0;
        A = 1;
        B = 2;
        C = 3;
      }

      InnerEnum mode = 3;
    }

    NestedLevel2 inner = 3;
  }

  NestedLevel1 nested1 = 25;

  // -------------------------------------------------------------------------
  // Oneof fields (mixed types)
  // -------------------------------------------------------------------------
  oneof special_oneof {
    string oneof_string = 26;
    int32  oneof_int32  = 27;
    NestedLevel1 oneof_msg = 28;
    bytes oneof_bytes   = 29 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP" }];
  }

  message RepeatedBytesHolder {
    repeated bytes values = 1;
  }

  message BoundedRepeatedBytesHolder {
    repeated bytes values = 1 [(protocyte.array) = { max: 3 }];
  }

  message FixedRepeatedBytesHolder {
    repeated bytes values = 1 [(protocyte.array) = { max: 3, fixed: true }];
  }

  oneof crazy_bytes_oneof {
    bytes crazy_plain_bytes = 49;
    bytes crazy_bounded_bytes = 50 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP" }];
    bytes crazy_fixed_bytes = 51 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP", fixed: true }];
    RepeatedBytesHolder crazy_repeated_bytes = 52;
    BoundedRepeatedBytesHolder crazy_bounded_repeated_bytes = 53;
    FixedRepeatedBytesHolder crazy_fixed_repeated_bytes = 54;
  }

  // -------------------------------------------------------------------------
  // Maps (all legal map key types)
  // -------------------------------------------------------------------------
  map<string, int32> map_str_int32      = 30;
  map<int32, string> map_int32_str      = 31;
  map<bool, bytes>   map_bool_bytes     = 32;
  map<uint64, NestedLevel1> map_uint64_msg = 33;

  // -------------------------------------------------------------------------
  // Deeply Nested Maps & Messages
  // -------------------------------------------------------------------------
  map<string, NestedLevel1.NestedLevel2> very_nested_map = 34;

  // -------------------------------------------------------------------------
  // Messages referencing themselves (cycle)
  // -------------------------------------------------------------------------
  UltimateComplexMessage recursive_self = 35;

  // -------------------------------------------------------------------------
  // Repeated messages + oneofs mixed
  // -------------------------------------------------------------------------
  repeated NestedLevel1.NestedLevel2 lots_of_nested = 36;

  // -------------------------------------------------------------------------
  // Huge repeated enum list
  // -------------------------------------------------------------------------
  repeated Color colors = 37;

  // -------------------------------------------------------------------------
  // Optional fields (proto3 style)
  // -------------------------------------------------------------------------
  optional int32 opt_int32 = 38;
  optional string opt_string = 39;

  // -------------------------------------------------------------------------
  // Extremely deep nesting
  // -------------------------------------------------------------------------
  message LevelA {
    message LevelB {
      message LevelC {
        message LevelD {
          message LevelE {
            string extreme = 1;
            map<int32, string> weird_map = 2;
            oneof deep_oneof {
              int64 val = 3;
              string text = 4;
            }
          }
        }
      }
    }
  }

  LevelA.LevelB.LevelC.LevelD.LevelE extreme_nesting = 40;

  // -------------------------------------------------------------------------
  // Fixed-size binary fields
  // -------------------------------------------------------------------------
  // SHA-256 digest stored inline as exactly 32 bytes, derived from constants.
  bytes sha256 = 41 [(protocyte.array) = { expr: "INTEGER_ARRAY_CAP * 4", fixed: true }];
  repeated int32 integer_array = 42 [(protocyte.array) = { expr: "INTEGER_ARRAY_CAP" }];
  bytes byte_array = 43 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP" }];
  repeated uint32 fixed_integer_array = 44 [(protocyte.array) = { expr: "(BITWISE_BASE >> 1) - 2", fixed: true }];
  bytes float_expr_array = 45 [(protocyte.array) = { expr: "pow(2, f64(-1)) * 4" }];
  repeated bytes repeated_byte_array = 46;
  repeated bytes bounded_repeated_byte_array = 47 [(protocyte.array) = { max: 3 }];
  repeated bytes fixed_repeated_byte_array = 48 [(protocyte.array) = { max: 3, fixed: true }];
}

// -----------------------------------------------------------------------------
// Additional Messages to Cross-Reference
// -----------------------------------------------------------------------------

message ExtraMessage {
  string tag = 1;
  UltimateComplexMessage ref = 2;
}

message CrossMessageConstants {
  option (protocyte.constant) = {
    name: "ROOT_MIRROR"
    u32_expr: "UltimateComplexMessage.INTEGER_ARRAY_CAP + 2"
  };
  option (protocyte.constant) = {
    name: "LABEL_COPY"
    str_expr: "PREFIX + \"-cross\""
  };
  option (protocyte.constant) = {
    name: "READY"
    boolean_expr: "UltimateComplexMessage.HAS_PREFIX && (ROOT_MIRROR == 10)"
  };

  bytes external_bytes = 1 [(protocyte.array) = { expr: "BYTE_ARRAY_CAP + 2" }];
  repeated int32 mirrored_values = 2 [(protocyte.array) = { expr: "ROOT_MIRROR" }];

  message Nested {
    option (protocyte.constant) = {
      name: "EXTERNAL_CAP"
      u32_expr: "BASE_COUNT + 3"
    };

    bytes nested_bytes = 1 [(protocyte.array) = { expr: "EXTERNAL_CAP" }];
  }

  Nested nested = 3;
}
