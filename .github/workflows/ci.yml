name: CI

on:
  workflow_call:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin:
    name: Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Lint Python sources
        run: uv run ruff check src tests smoke/tools debugger

      - name: Build plugin package
        run: uv build

      - name: Run plugin tests
        run: uv run pytest -q

  smoke-host:
    name: Smoke Host
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Verify checked smoke outputs
        run: |
          uv run python smoke/tools/generate_checked_outputs.py
          git diff --exit-code -- smoke/generated

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure non-kernel smoke tests
        working-directory: smoke
        run: cmake --preset windows-clangcl-ninja

      - name: Build non-kernel smoke tests
        working-directory: smoke
        run: cmake --build --preset windows-clangcl-ninja

      - name: Run non-kernel smoke tests
        working-directory: smoke
        run: ctest --preset windows-clangcl-ninja

  fetchcontent-linux:
    name: FetchContent Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Configure FetchContent integration test
        run: >
          cmake -S tests/fetchcontent -B tests/fetchcontent/build
          -DPython3_EXECUTABLE=${{ github.workspace }}/.venv/bin/python

      - name: Build FetchContent integration test
        run: cmake --build tests/fetchcontent/build

      - name: Run FetchContent integration test
        run: ctest --test-dir tests/fetchcontent/build --output-on-failure

  find-package-linux:
    name: Find Package Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Configure protocyte install tree
        run: cmake -S . -B build/protocyte-install

      - name: Install protocyte package
        run: cmake --install build/protocyte-install --prefix build/protocyte-prefix

      - name: Configure find_package integration test
        run: >
          cmake -S tests/find_package -B tests/find_package/build
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/build/protocyte-prefix
          -DPython3_EXECUTABLE=${{ github.workspace }}/.venv/bin/python
          -DPROTOCYTE_FETCH_PROTOBUF=ON

      - name: Build find_package integration test
        run: cmake --build tests/find_package/build

      - name: Run find_package integration test
        run: ctest --test-dir tests/find_package/build --output-on-failure

  hell-linux:
    name: Hell Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Install hell
        run: npm install --global rili-hell@1.5.0

      - name: Run hell integration test
        run: uv run python tests/hell/run_ci.py
